version: "3.8"
services:
  postgresql:
    image: registry.redhat.io/rhel9/postgresql-15:latest
    container_name: gateforge-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_USER: gateforge
      POSTGRESQL_PASSWORD: gateforge
      POSTGRESQL_DATABASE: gateforge
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gateforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.jvm
    container_name: gateforge-backend
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: dev
      AI_ENDPOINT: ${AI_ENDPOINT:-https://litellm-prod.apps.maas.redhatworkshops.io/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-r1-distill-qwen-14b}
      AI_API_KEY: ${AI_API_KEY:-dummy}
      THREESCALE_ADMIN_URL: ${THREESCALE_ADMIN_URL:-}
      THREESCALE_ACCESS_TOKEN: ${THREESCALE_ACCESS_TOKEN:-}
      THREESCALE_SOURCES: ${THREESCALE_SOURCES:-}
      TARGET_CLUSTERS: ${TARGET_CLUSTERS:-}
      ARGOCD_CLUSTER_DISCOVERY: ${ARGOCD_CLUSTER_DISCOVERY:-false}
      DATASOURCE_URL: jdbc:postgresql://postgresql:5432/gateforge
      DATASOURCE_USERNAME: gateforge
      DATASOURCE_PASSWORD: gateforge
      QUARKUS_KUBERNETES_CLIENT_MASTER_URL: ${KUBE_API_URL:-}
      QUARKUS_KUBERNETES_CLIENT_TOKEN: ${KUBE_TOKEN:-}
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gateforge-frontend
    ports:
      - "4200:8080"
    depends_on:
      backend:
        condition: service_healthy
