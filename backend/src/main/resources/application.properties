# GateForge Backend Configuration
quarkus.application.name=gateforge-backend
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Kubernetes Client (in-cluster auto-detected, or manual for dev)
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.devservices.enabled=false
# When running outside a cluster, set these:
# quarkus.kubernetes-client.master-url=
# quarkus.kubernetes-client.token=

# 3scale Admin API
gateforge.threescale.admin-url=${THREESCALE_ADMIN_URL:http://localhost}
gateforge.threescale.access-token=${THREESCALE_ACCESS_TOKEN:none}
gateforge.threescale.crd-discovery=true

# AI / LLM Configuration (OpenAI-compatible via LiteLLM)
quarkus.langchain4j.openai.base-url=${AI_ENDPOINT:https://litellm-prod.apps.maas.redhatworkshops.io/v1}
quarkus.langchain4j.openai.api-key=${AI_API_KEY:dummy}
quarkus.langchain4j.openai.chat-model.model-name=${AI_MODEL:deepseek-r1-distill-qwen-14b}
quarkus.langchain4j.openai.chat-model.temperature=0.3
quarkus.langchain4j.openai.chat-model.max-tokens=4096
quarkus.langchain4j.openai.timeout=120s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# Connectivity Link defaults
gateforge.connectivity-link.target-namespace=${CL_TARGET_NAMESPACE:kuadrant-system}
gateforge.connectivity-link.gateway-strategy=${CL_GATEWAY_STRATEGY:shared}
gateforge.connectivity-link.gateway-class-name=${CL_GATEWAY_CLASS:istio}
gateforge.cluster-domain=${CLUSTER_DOMAIN:apps.cluster.example.com}

# Developer Hub integration (disabled by default)
gateforge.developer-hub.enabled=${DEVELOPER_HUB_ENABLED:false}
gateforge.developer-hub.url=${DEVELOPER_HUB_URL:none}

# kuadrantctl
gateforge.kuadrantctl.path=${KUADRANTCTL_PATH:/usr/local/bin/kuadrantctl}

# OpenShift deployment
quarkus.openshift.route.expose=true
quarkus.container-image.group=maximilianopizarro
quarkus.container-image.name=gateforge-backend
