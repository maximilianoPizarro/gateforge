{{- if .Values.datagrid.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gateforge.datagrid" . }}-secret
  labels:
    {{- include "gateforge.datagridLabels" . | nindent 4 }}
type: Opaque
stringData:
  DATAGRID_USERNAME: {{ .Values.datagrid.credentials.username | quote }}
  DATAGRID_PASSWORD: {{ .Values.datagrid.credentials.password | quote }}
{{- end }}
