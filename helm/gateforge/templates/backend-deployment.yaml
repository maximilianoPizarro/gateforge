apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateforge.fullname" . }}-backend
  labels:
    app: gateforge-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: gateforge-backend
    app.openshift.io/runtime: quarkus
    {{- include "gateforge.labels" . | nindent 4 }}
  annotations:
    app.openshift.io/runtime: quarkus
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"{{ include "gateforge.fullname" . }}-postgresql"}{{- if .Values.datagrid.enabled }},{"apiVersion":"apps/v1","kind":"StatefulSet","name":"{{ include "gateforge.datagrid" . }}"}{{- end }}]'
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: gateforge-backend
  template:
    metadata:
      labels:
        app: gateforge-backend
        app.openshift.io/runtime: quarkus
    spec:
      serviceAccountName: {{ include "gateforge.fullname" . }}-backend
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AI_ENDPOINT
              value: {{ .Values.ai.endpoint | quote }}
            - name: AI_MODEL
              value: {{ .Values.ai.model | quote }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ai.existingSecret | default (printf "%s-ai-secret" (include "gateforge.fullname" .)) }}
                  key: AI_API_KEY
            - name: THREESCALE_ADMIN_URL
              value: {{ .Values.threescale.adminApi.url | quote }}
            - name: THREESCALE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gateforge.fullname" . }}-config
                  key: THREESCALE_ACCESS_TOKEN
            - name: CL_TARGET_NAMESPACE
              value: {{ .Values.connectivityLink.targetNamespace | quote }}
            - name: CL_GATEWAY_STRATEGY
              value: {{ .Values.connectivityLink.gatewayStrategy | quote }}
            - name: CL_GATEWAY_CLASS
              value: {{ .Values.connectivityLink.gatewayClassName | quote }}
            - name: CLUSTER_DOMAIN
              value: {{ .Values.clusterDomain | quote }}
            - name: DEVELOPER_HUB_ENABLED
              value: {{ .Values.developerHub.enabled | default false | quote }}
            - name: DEVELOPER_HUB_URL
              value: {{ .Values.developerHub.url | default "" | quote }}
            - name: THREESCALE_SOURCES
              value: {{ .Values.threescale.sources | default "" | quote }}
            - name: TARGET_CLUSTERS
              value: {{ .Values.targetClusters | default "" | quote }}
            - name: ARGOCD_CLUSTER_DISCOVERY
              value: {{ .Values.argocd.clusterDiscovery | default false | quote }}
            - name: DATASOURCE_URL
              value: {{ .Values.postgresql.url | default "jdbc:postgresql://gateforge-postgresql:5432/gateforge" | quote }}
            - name: DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "gateforge.fullname" . }}-config
                  key: DATASOURCE_USERNAME
            - name: DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gateforge.fullname" . }}-config
                  key: DATASOURCE_PASSWORD
            {{- if .Values.datagrid.enabled }}
            - name: DATAGRID_HOST
              value: {{ include "gateforge.datagrid" . }}
            - name: DATAGRID_PORT
              value: "11222"
            - name: DATAGRID_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "gateforge.datagrid" . }}-secret
                  key: DATAGRID_USERNAME
            - name: DATAGRID_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gateforge.datagrid" . }}-secret
                  key: DATAGRID_PASSWORD
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
